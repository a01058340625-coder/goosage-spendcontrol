services:
  mysql:
    image: mysql:8.0
    container_name: goosage-mysql
    restart: unless-stopped
    environment:
      TZ: Asia/Seoul
      MYSQL_DATABASE: goosage
      MYSQL_USER: goosage
      MYSQL_PASSWORD: goosage123
      MYSQL_ROOT_PASSWORD: root123
    ports:
      - "3307:3306"
    command: >
      --default-authentication-plugin=mysql_native_password
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_0900_ai_ci
    volumes:
      - goosage_mysql_data:/var/lib/mysql

  api:
    build: .
    container_name: goosage-api
    restart: unless-stopped
    depends_on:
      - mysql
    ports:
      - "8083:8084"
    environment:
      SPRING_PROFILES_ACTIVE: local
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/goosage?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Seoul&characterEncoding=UTF-8
      SPRING_DATASOURCE_USERNAME: goosage
      SPRING_DATASOURCE_PASSWORD: goosage123

volumes:
  goosage_mysql_data: